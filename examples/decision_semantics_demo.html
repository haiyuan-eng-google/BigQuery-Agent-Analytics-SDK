const SQL_TEMPLATES = {
  extendedOutputSchema: {
    name: 'Extended AI.GENERATE output_schema',
    category: 'Extraction',
    sql: `-- Extended output_schema for decision semantics extraction
-- Prompts Gemini to extract not just entities, but full decision context

MERGE \`project.dataset.decision_nodes\` AS target
USING (
  SELECT
    CONCAT('dp-', base.span_id) AS decision_id,
    base.span_id,
    base.session_id,
    JSON_EXTRACT_SCALAR(decision, '$.decision_type') AS decision_type,
    JSON_EXTRACT_SCALAR(decision, '$.decision_rationale') AS rationale,
    JSON_EXTRACT_ARRAY(decision, '$.candidates_evaluated') AS candidates_json
  FROM \`project.dataset.agent_events\` AS base,
  UNNEST([
    AI.GENERATE(
      CONCAT(
        'Analyze this agent action and extract the decision context. ',
        'Identify: what decision was made, why, and what alternatives ',
        'were considered and rejected.',
        '\\n\\nPayload:\\n',
        TO_JSON_STRING(base.content)
      ),
      endpoint => 'gemini-2.5-flash',
      output_schema => '{
        "type": "OBJECT",
        "properties": {
          "decision_type": {"type": "STRING"},
          "decision_rationale": {"type": "STRING"},
          "candidates_evaluated": {
            "type": "ARRAY",
            "items": {
              "type": "OBJECT",
              "properties": {
                "candidate_value": {"type": "STRING"},
                "score": {"type": "NUMBER"},
                "is_selected": {"type": "BOOLEAN"},
                "rejection_reason": {"type": "STRING"}
              }
            }
          }
        }
      }'
    )
  ]) AS decision
  WHERE base.session_id IN UNNEST(@session_ids)
    AND base.event_type = 'TOOL_COMPLETED'
    AND JSON_EXTRACT_SCALAR(base.content, '$.result.decision') IS NOT NULL
) AS source
ON target.decision_id = source.decision_id
WHEN MATCHED THEN
  UPDATE SET rationale = source.rationale
WHEN NOT MATCHED BY TARGET THEN
  INSERT (decision_id, span_id, session_id, decision_type, rationale)
  VALUES (source.decision_id, source.span_id, source.session_id,
          source.decision_type, source.rationale)`,
  },
  createTables: {
    name: 'Decision & Candidate Tables DDL',
    category: 'Schema',
    sql: `-- Table 1: DecisionPoint nodes
CREATE TABLE IF NOT EXISTS \`project.dataset.decision_points\` (
  decision_id STRING,              -- Primary key
  session_id STRING,
  span_id STRING,                  -- Links to TechNode that made the decision
  decision_type STRING,            -- e.g. "audience_selection", "placement_selection"
  description STRING               -- Decision description
);

-- Table 2: Candidate nodes
CREATE TABLE IF NOT EXISTS \`project.dataset.candidates\` (
  candidate_id STRING,             -- Primary key
  decision_id STRING,              -- Links to DecisionPoint
  session_id STRING,
  name STRING,                     -- Candidate name (e.g. "Athletes 18-35")
  score FLOAT64,                   -- Evaluation score (0.0-1.0)
  status STRING,                   -- "SELECTED" or "DROPPED"
  rejection_rationale STRING       -- EU audit: why was this candidate dropped?
);

-- Table 3: MadeDecision edges (TechNode -> DecisionPoint)
CREATE TABLE IF NOT EXISTS \`project.dataset.made_decision_edges\` (
  edge_id STRING,
  span_id STRING,                  -- Source: TechNode
  decision_id STRING,              -- Destination: DecisionPoint
  created_at TIMESTAMP
);

-- Table 4: CandidateEdge edges (DecisionPoint -> CandidateNode)
CREATE TABLE IF NOT EXISTS \`project.dataset.candidate_edges\` (
  edge_id STRING,
  decision_id STRING,              -- Source: DecisionPoint
  candidate_id STRING,             -- Destination: CandidateNode
  edge_type STRING,                -- "SELECTED_CANDIDATE" or "DROPPED_CANDIDATE"
  rejection_rationale STRING,      -- EU audit: why was this candidate dropped?
  created_at TIMESTAMP
);`,
  },
  propertyGraphDDL: {
    name: 'Extended Property Graph DDL',
    category: 'Graph',
    sql: `-- Extended Property Graph with Decision Semantics (6-pillar)
-- Adds DecisionPoint + CandidateNode tables, MadeDecision + CandidateEdge edges
CREATE OR REPLACE PROPERTY GRAPH \`project.dataset.agent_context_graph\`
  NODE TABLES (
    -- Pillar 1: Technical execution nodes (from ADK plugin)
    \`project.dataset.agent_events\` AS TechNode
      KEY (span_id) LABEL TechNode
      PROPERTIES (event_type, agent, timestamp, session_id, content, status),

    -- Pillar 2: Business domain nodes (AI.GENERATE extracted)
    \`project.dataset.extracted_biz_nodes\` AS BizNode
      KEY (biz_node_id) LABEL BizNode
      PROPERTIES (node_type, node_value, confidence, session_id, artifact_uri),

    -- Pillar 5: Decision point nodes
    \`project.dataset.decision_points\` AS DecisionPoint
      KEY (decision_id) LABEL DecisionPoint
      PROPERTIES (session_id, span_id, decision_type, description),

    -- Pillar 6: Candidate nodes
    \`project.dataset.candidates\` AS CandidateNode
      KEY (candidate_id) LABEL CandidateNode
      PROPERTIES (decision_id, session_id, name, score, status, rejection_rationale)
  )
  EDGE TABLES (
    -- Causal lineage: parent span -> child span
    \`project.dataset.agent_events\` AS Caused
      KEY (span_id)
      SOURCE KEY (parent_span_id) REFERENCES TechNode (span_id)
      DESTINATION KEY (span_id) REFERENCES TechNode (span_id)
      LABEL Caused,

    -- Cross-link: tech event -> business entity
    \`project.dataset.context_cross_links\` AS Evaluated
      KEY (link_id)
      SOURCE KEY (span_id) REFERENCES TechNode (span_id)
      DESTINATION KEY (biz_node_id) REFERENCES BizNode (biz_node_id)
      LABEL Evaluated
      PROPERTIES (artifact_uri, link_type, created_at),

    -- TechNode -> DecisionPoint (span that made the decision)
    \`project.dataset.made_decision_edges\` AS MadeDecision
      KEY (edge_id)
      SOURCE KEY (span_id) REFERENCES TechNode (span_id)
      DESTINATION KEY (decision_id) REFERENCES DecisionPoint (decision_id)
      LABEL MadeDecision,

    -- DecisionPoint -> CandidateNode (selected or dropped)
    \`project.dataset.candidate_edges\` AS CandidateEdge
      KEY (edge_id)
      SOURCE KEY (decision_id) REFERENCES DecisionPoint (decision_id)
      DESTINATION KEY (candidate_id) REFERENCES CandidateNode (candidate_id)
      LABEL CandidateEdge
      PROPERTIES (edge_type, rejection_rationale, created_at)
  )`,
  },
  gqlAuditTrail: {
    name: 'GQL: "Why was X shown instead of Y?" (EU Audit)',
    category: 'Graph',
    sql: `-- EU Regulatory Audit Query:
-- "Why was Athletes 18-35 selected instead of Fitness Enthusiasts?"
-- Traces: TechNode -> MadeDecision -> DecisionPoint -> CandidateEdge -> CandidateNode

GRAPH \`project.dataset.agent_context_graph\`
MATCH
  (step:TechNode)-[md:MadeDecision]->(dp:DecisionPoint)
    -[ce:CandidateEdge]->(cand:CandidateNode)
WHERE dp.session_id = @session_id
RETURN
  dp.decision_id,
  dp.decision_type,
  dp.description AS decision_description,
  cand.name AS candidate_name,
  cand.score AS candidate_score,
  cand.status AS candidate_status,
  cand.rejection_rationale,
  ce.edge_type,
  step.span_id,
  step.event_type,
  step.agent
ORDER BY dp.decision_id, cand.score DESC`,
  },
  gqlDroppedOnly: {
    name: 'GQL: All Dropped Candidates with Rationale',
    category: 'Graph',
    sql: `-- Query for compliance: retrieve ALL dropped candidates and their rationale
-- Answers: "Show me every candidate that was rejected and explain why"

GRAPH \`project.dataset.agent_context_graph\`
MATCH
  (dp:DecisionPoint)-[ce:CandidateEdge]->(cand:CandidateNode)
WHERE dp.session_id = @session_id
  AND ce.edge_type = 'DROPPED_CANDIDATE'
RETURN
  dp.decision_id,
  dp.decision_type,
  dp.description AS decision_description,
  cand.name AS candidate_name,
  cand.score AS candidate_score,
  cand.rejection_rationale
ORDER BY dp.decision_id, cand.score DESC`,
  },
};

);

const Card = ({ children, title, subtitle, style = {}, headerAction, noPadding }) => (
  <div style={{ background: 'white', borderRadius: '8px', boxShadow: '0 1px 2px rgba(60,64,67,0.1), 0 1px 3px rgba(60,64,67,0.08)', ...style }}>
    {(title || headerAction) && (
      <div style={{ padding: '16px 20px', borderBottom: `1px solid ${C.grey[200]}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          {title && <h3 style={{ margin: 0, fontSize: '16px', fontWeight: 500, color: C.grey[900] }}>{title}</h3>}
          {subtitle && <p style={{ margin: '4px 0 0 0', fontSize: '12px', color: C.grey[500] }}>{subtitle}</p>}
        </div>
        {headerAction}
      </div>
    )}
    <div style={{ padding: noPadding ? 0 : (title ? '16px 20px' : '0') }}>{children}</div>
  </div>
);

const Badge = ({ color = 'blue', children, onClick }) => {
  const cm = { blue: { bg: C.blue[50], text: C.blue[500] }, green: { bg: C.green[50], text: C.green[500] }, yellow: { bg: C.yellow[50], text: C.yellow[600] }, red: { bg: C.red[50], text: C.red[500] }, purple: { bg: C.purple[50], text: C.purple[500] }, grey: { bg: C.grey[100], text: C.grey[700] }, orange: { bg: C.orange[50], text: C.orange[500] }, cyan: { bg: C.cyan[50], text: C.cyan[500] }, teal: { bg: C.teal[50], text: C.teal[500] } };
  const { bg, text } = cm[color] || cm.blue;
  return <span onClick={onClick} style={{ display: 'inline-block', padding: '2px 8px', borderRadius: '12px', background: bg, color: text, fontSize: '11px', fontWeight: 500, cursor: onClick ? 'pointer' : 'default' }}>{children}</span>;
};

const Button = ({ onClick, primary, disabled, small, children, style = {} }) => (
  <button onClick={onClick} disabled={disabled} style={{
    display: 'inline-flex', alignItems: 'center', gap: '6px',
    padding: small ? '6px 12px' : '10px 20px', borderRadius: '4px',
    border: primary ? 'none' : `1px solid ${C.grey[300]}`,
    background: disabled ? C.grey[200] : primary ? C.blue[500] : 'white',
    color: disabled ? C.grey[500] : primary ? 'white' : C.grey[700],
    fontWeight: 500, fontSize: small ? '12px' : '14px',
    cursor: disabled ? 'not-allowed' : 'pointer', transition: 'all 0.15s', ...style,
  }}>{children}</button>
);

const DecisionGraphViz = ({ session }) => {
  const [selectedNode, setSelectedNode] = useState(null);
  if (!session) return null;

  const dp = session.decisionPoints[0];
  const selected = dp.candidates.filter(c => c.is_selected);
  const dropped = dp.candidates.filter(c => !c.is_selected);

  // Layout: TechNodes at top, DecisionPoint in middle, Candidates at bottom
  const techNodes = session.events.map((e, i) => ({
    id: e.span_id, type: 'tech', label: e.event_type.replace(/_/g, ' ').replace(/COMPLETED|STARTING|RECEIVED/g, '').trim(),
    agent: e.agent, x: 60 + (i % 6) * 140, y: 50 + Math.floor(i / 6) * 80,
    color: e.event_type.includes('TOOL') ? C.red[500] : e.event_type.includes('HITL') ? C.yellow[500] : e.event_type.includes('AGENT') ? C.green[500] : e.event_type === 'USER_MESSAGE_RECEIVED' ? C.blue[500] : C.purple[500],
    event: e,
  }));

  const decisionNode = {
    id: dp.decision_id, type: 'decision',
    label: dp.decision_type.replace(/_/g, ' '),
    x: 400, y: 270,
    color: C.teal[500],
  };

  const candidateNodes = dp.candidates.map((c, i) => ({
    id: `cand-${c.candidate_value}`, type: 'candidate',
    label: c.candidate_value, score: c.score,
    is_selected: c.is_selected, rejection_reason: c.rejection_reason,
    x: 120 + i * 220, y: 400,
    color: c.is_selected ? C.green[500] : C.red[500],
    candidate: c,
  }));

  const nodeMap = new Map([...techNodes, decisionNode, ...candidateNodes].map(n => [n.id, n]));

  // Edges
  const causedEdges = session.events.filter(e => e.parent_span_id && nodeMap.has(e.parent_span_id))
    .map(e => ({ from: e.parent_span_id, to: e.span_id, type: 'Caused' }));

  const decisionSpan = nodeMap.get(dp.span_id);
  const madeDecisionEdge = decisionSpan ? { from: dp.span_id, to: dp.decision_id, type: 'MadeDecision' } : null;

  const candidateEdges = candidateNodes.map(c => ({
    from: dp.decision_id, to: c.id,
    type: c.is_selected ? 'SelectedCandidate' : 'DroppedCandidate',
  }));

  const drawEdge = (edge, i) => {
    const from = nodeMap.get(edge.from), to = nodeMap.get(edge.to);
    if (!from || !to) return null;
    const colors = { Caused: C.grey[400], MadeDecision: C.teal[500], SelectedCandidate: C.green[500], DroppedCandidate: C.red[500] };
    const dashed = edge.type === 'MadeDecision' || edge.type === 'DroppedCandidate';
    return <line key={`${edge.type}-${i}`} x1={from.x} y1={from.y} x2={to.x} y2={to.y}
      stroke={colors[edge.type] || C.grey[400]} strokeWidth={edge.type === 'Caused' ? 1.5 : 2.5}
      strokeDasharray={dashed ? '8,4' : 'none'} opacity={edge.type === 'Caused' ? 0.3 : 0.7} />;
  };

  return (
    <div>
      <svg width="100%" height="500" style={{ background: C.grey[50], borderRadius: '8px' }}>
        {/* Layer labels */}
        <text x="16" y="26" fontSize="11" fill={C.grey[500]} fontWeight="500">TECHNICAL GRAPH (ADK Spans)</text>
        <line x1="0" y1="220" x2="100%" y2="220" stroke={C.grey[300]} strokeDasharray="4,4" />
        <text x="16" y="240" fontSize="11" fill={C.grey[500]} fontWeight="500">DECISION LAYER (DecisionPoint)</text>
        <line x1="0" y1="340" x2="100%" y2="340" stroke={C.grey[300]} strokeDasharray="4,4" />
        <text x="16" y="358" fontSize="11" fill={C.grey[500]} fontWeight="500">CANDIDATE LAYER (Selected / Dropped)</text>

        {/* Edges */}
        {causedEdges.map((e, i) => drawEdge(e, i))}
        {madeDecisionEdge && drawEdge(madeDecisionEdge, 'md')}
        {candidateEdges.map((e, i) => drawEdge(e, i))}

        {/* Tech nodes (circles) */}
        {techNodes.map(n => (
          <g key={n.id} transform={`translate(${n.x}, ${n.y})`} onClick={() => setSelectedNode(n)} style={{ cursor: 'pointer' }}>
            {selectedNode?.id === n.id && <circle r="20" fill="none" stroke={C.blue[500]} strokeWidth="3" />}
            <circle r="14" fill={n.color} stroke="white" strokeWidth="2" />
            <text textAnchor="middle" dy="28" fontSize="9" fill={C.grey[700]}>{n.label.substring(0, 14)}</text>
          </g>
        ))}

        {/* Decision node (diamond) */}
        <g transform={`translate(${decisionNode.x}, ${decisionNode.y})`} onClick={() => setSelectedNode({ ...decisionNode, dp })} style={{ cursor: 'pointer' }}>
          {selectedNode?.id === decisionNode.id && <rect x="-32" y="-32" width="64" height="64" rx="4" fill="none" stroke={C.blue[500]} strokeWidth="3" transform="rotate(45)" />}
          <rect x="-24" y="-24" width="48" height="48" rx="4" fill={decisionNode.color} stroke="white" strokeWidth="2" transform="rotate(45)" />
          <text textAnchor="middle" dy="4" fontSize="10" fill="white" fontWeight="600">DP</text>
          <text textAnchor="middle" dy="50" fontSize="10" fill={C.teal[500]} fontWeight="500">{decisionNode.label}</text>
        </g>

        {/* Candidate nodes (rounded rects) */}
        {candidateNodes.map(n => (
          <g key={n.id} transform={`translate(${n.x}, ${n.y})`} onClick={() => setSelectedNode(n)} style={{ cursor: 'pointer' }}>
            {selectedNode?.id === n.id && <rect x="-72" y="-22" width="144" height="44" rx="8" fill="none" stroke={C.blue[500]} strokeWidth="3" />}
            <rect x="-68" y="-18" width="136" height="36" rx="6" fill={n.color} stroke="white" strokeWidth="2" />
            <text textAnchor="middle" dy="-2" fontSize="10" fill="white" fontWeight="500">{n.label.substring(0, 18)}</text>
            <text textAnchor="middle" dy="12" fontSize="9" fill="rgba(255,255,255,0.8)">{n.is_selected ? 'SELECTED' : 'DROPPED'} ({(n.score * 100).toFixed(0)}%)</text>
          </g>
        ))}

        {/* Legend */}
        <g transform="translate(16, 475)">
          <circle cx="6" cy="0" r="5" fill={C.grey[400]} /><text x="16" y="4" fontSize="9" fill={C.grey[500]}>Caused</text>
          <line x1="80" y1="0" x2="110" y2="0" stroke={C.teal[500]} strokeWidth="2.5" strokeDasharray="8,4" /><text x="116" y="4" fontSize="9" fill={C.grey[500]}>MADE_DECISION</text>
          <line x1="230" y1="0" x2="260" y2="0" stroke={C.green[500]} strokeWidth="2.5" /><text x="266" y="4" fontSize="9" fill={C.grey[500]}>SELECTED_CANDIDATE</text>
          <line x1="400" y1="0" x2="430" y2="0" stroke={C.red[500]} strokeWidth="2.5" strokeDasharray="8,4" /><text x="436" y="4" fontSize="9" fill={C.grey[500]}>DROPPED_CANDIDATE</text>
          <rect x="590" y="-8" width="16" height="16" rx="2" fill={C.teal[500]} transform="rotate(45, 598, 0)" /><text x="616" y="4" fontSize="9" fill={C.grey[500]}>DecisionPoint</text>
        </g>
      </svg>

      {/* Node detail panel */}
      {selectedNode && (
        <Card style={{ marginTop: '12px', border: `2px solid ${C.blue[200]}` }} title={
          selectedNode.type === 'tech' ? `TechNode: ${selectedNode.label}` :
          selectedNode.type === 'decision' ? `DecisionPoint: ${selectedNode.label}` :
          `Candidate: ${selectedNode.label}`
        }>
          {selectedNode.type === 'tech' && (
            <div style={{ fontSize: '12px' }}>
              <div><strong>span_id:</strong> <code>{selectedNode.id}</code></div>
              <div><strong>agent:</strong> {selectedNode.agent}</div>
              <div><strong>event_type:</strong> {selectedNode.event?.event_type}</div>
              {selectedNode.event?.content && <pre style={{ marginTop: '8px', padding: '8px', background: C.grey[50], borderRadius: '4px', fontSize: '11px', overflow: 'auto', maxHeight: '120px' }}>{JSON.stringify(selectedNode.event.content, null, 2)}</pre>}
            </div>
          )}
          {selectedNode.type === 'decision' && selectedNode.dp && (
            <div style={{ fontSize: '12px' }}>
              <div><strong>decision_id:</strong> <code>{selectedNode.dp.decision_id}</code></div>
              <div><strong>decision_type:</strong> <Badge color="teal">{selectedNode.dp.decision_type}</Badge></div>
              <div style={{ marginTop: '8px' }}><strong>Rationale:</strong></div>
              <div style={{ padding: '8px', background: C.teal[50], borderRadius: '4px', marginTop: '4px', lineHeight: '1.5' }}>{selectedNode.dp.rationale}</div>
              <div style={{ marginTop: '8px' }}><strong>Candidates evaluated:</strong> {selectedNode.dp.candidates.length}</div>
            </div>
          )}
          {selectedNode.type === 'candidate' && selectedNode.candidate && (
            <div style={{ fontSize: '12px' }}>
              <div><strong>candidate_value:</strong> {selectedNode.candidate.candidate_value}</div>
              <div><strong>score:</strong> {(selectedNode.candidate.score * 100).toFixed(0)}%</div>
              <div><strong>status:</strong> <Badge color={selectedNode.candidate.is_selected ? 'green' : 'red'}>{selectedNode.candidate.is_selected ? 'SELECTED' : 'DROPPED'}</Badge></div>
              {selectedNode.candidate.rejection_reason && (

        </Card>
      )}
    </div>
  );
};

const SDKCodePanel = ({ session }) => {
  const dp = session.decisionPoints[0];
  const code = `from bigquery_agent_analytics.context_graph import ContextGraphManager, ContextGraphConfig

# Initialize
cgm = ContextGraphManager(
    project_id="my-project",
    dataset_id="agent_analytics",
    config=ContextGraphConfig(endpoint="gemini-2.5-flash"),
)

# Step 1: Extract business entities + decision semantics
biz_nodes = cgm.extract_biz_nodes(
    session_ids=["${session.id}"],
    use_ai_generate=True,
)

# Step 2: Extract decision points from agent traces
decision_points, candidates = cgm.extract_decision_points(
    session_ids=["${session.id}"],
    use_ai_generate=True,
)
print(f"Found {len(decision_points)} decision points")

# Step 2b: Store pre-extracted decision points + candidates
# (Idempotent: deletes existing data for the session first)
cgm.store_decision_points(decision_points, candidates)

# Step 3: Create cross-links + decision edges
cgm.create_cross_links(["${session.id}"])
cgm.create_decision_edges(["${session.id}"])

# Step 4: Create extended Property Graph (6-pillar)
# Nodes: TechNode, BizNode, DecisionPoint, CandidateNode
# Edges: Caused, Evaluated, MadeDecision, CandidateEdge
cgm.create_property_graph(include_decisions=True)

# Step 5: EU Regulatory Audit — "Why was X chosen instead of Y?"
audit_trail = cgm.explain_decision(
    session_id="${session.id}",
    decision_type="${dp.decision_type}",
    include_dropped=True,  # Include rejected candidates with rationale
)

for result in audit_trail:
    for decision in result.get("decision_candidates", []):
        print(f"Decision: {decision['decision_type']}")
        for c in decision["candidates"]:
            print(f"  {c['status']}: {c['name']} "
                  f"(score={c['score']:.2f})")
            if c["status"] == "DROPPED":
                print(f"    Reason: {c['rejection_rationale']}")

# Step 6: Export audit trail (dict or JSON string)
report = cgm.export_audit_trail(
    session_id="${session.id}",
    format="json",  # Returns JSON string; use "dict" for list of dicts
)
# report contains: decision_point, all candidates, rationale
# Satisfies: "Why was this ad shown instead of that one?"`;

  return (
    <Card title="Python SDK Usage" subtitle="Decision Semantics API">
      <pre style={{ margin: 0, padding: '16px', background: '#1e1e1e', borderRadius: '8px', color: '#d4d4d4', fontSize: '11px', lineHeight: '1.6', fontFamily: "'Roboto Mono', monospace", overflow: 'auto', maxHeight: '600px' }}>{code}</pre>
    </Card>
  );
};
